<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gracias | TAMESAD</title>
  
  <!-- Favicon TAMESAD -->
  <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./img/favicon.png">
  
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root{
      --bg:#0B0E13; --bg-elev:#131A24;
      --ink:#E7ECF5; --ink-muted:#9AA7BD;
      --cyan:#4CC7F5; --teal:#27B6A8;
      --font-heading:'Space Grotesk', sans-serif;
      --font-body:'Inter', sans-serif;
    }
    *{box-sizing:border-box; margin:0; padding:0}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:var(--font-body);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:radial-gradient(800px 400px at 50% 0%, rgba(76,199,245,.15), transparent 60%);
    }
    .card{
      max-width:600px;
      text-align:center;
      background:var(--bg-elev);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:60px 40px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      animation:fade-in-up 0.6s ease-out;
    }
    .logo{
      width:80px;
      height:80px;
      margin:0 auto 24px;
      animation:pulse 2s ease-in-out infinite;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }
    .icon-check{
      width:80px;
      height:80px;
      margin:0 auto 24px;
      background:linear-gradient(135deg,var(--cyan),var(--teal));
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      animation:pulse 2s ease-in-out infinite;
    }
    h1{
      font-family:var(--font-heading);
      font-size:clamp(28px,5vw,42px);
      margin-bottom:16px;
    }
    p{
      color:var(--ink-muted);
      font-size:18px;
      line-height:1.6;
      margin-bottom:32px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:16px 32px;
      background:linear-gradient(135deg,#4CC7F5,#6BD3FF);
      color:#0B0E13;
      text-decoration:none;
      border-radius:999px;
      font-weight:700;
      font-size:16px;
      transition:all 0.3s ease;
    }
    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 30px rgba(76,199,245,.4);
    }
    .whatsapp-link{
      margin-top:20px;
      font-size:14px;
      color:var(--ink-muted);
    }
    .whatsapp-link a{
      color:var(--cyan);
      text-decoration:none;
      font-weight:600;
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="./img/favicon.png" alt="TAMESAD">
    </div>
    <h1>¡Mensaje recibido!</h1>
    <p>Gracias por tu interés en TAMESAD. Revisamos tu información y te contactamos en menos de 24 horas para coordinar tu inscripción al programa.</p>
    <p style="font-size:14px; opacity:0.7;">Mientras tanto, si es urgente puedes escribirnos directo.</p>
    <a href="https://tamesading.github.io/tamesad.com" class="btn">Volver al inicio</a>
    <div class="whatsapp-link">
      O escríbenos: <a href="https://wa.me/51939834534?text=Hola,%20acabo%20de%20enviar%20el%20formulario%20de%20TAMESAD" target="_blank">WhatsApp directo</a>
    </div>
  </div>
  
  <script>
    // Redirige al inicio después de 10 segundos
    setTimeout(() => {
      window.location.href = 'https://tamesading.github.io/tamesad.com';
    }, 10000);
  </script>
</body>
</html>
